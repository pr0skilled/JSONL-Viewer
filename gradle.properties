# Host default JDK is 26, which breaks Gradle 8.10's Kotlin DSL compiler.
# Daemon must run on a JDK ≤21. Compilation target stays 21 via jvmToolchain,
# which the IntelliJ Platform plugin resolves to the downloaded JBR independently.
# CI on a different host should override this line.
org.gradle.java.home=/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home
org.gradle.jvmargs=-Xmx2g
kotlin.stdlib.default.dependency=false
